<!-- 교사 로그인 박스 (admin/1234! 제거 버전 포함) -->
<div class="card" id="teacherLoginBox" style="display:none;">
<h2>교사 로그인</h2>

<input id="adminId" placeholder="아이디">
<input id="adminPw" type="password" placeholder="비밀번호">

<button class="primary" onclick="teacherLogin()">로그인</button>
<button class="gray" onclick="closeTeacher()">뒤로가기</button>
</div>

<!-- 교사 관리 페이지 -->
<div class="page" id="managePage">

<div class="card">
<h2>학교 관리</h2>

<div class="step">STEP 1. 유형 선택</div>
<select id="manageType"></select>

<div class="step">STEP 2. 지역 선택</div>
<select id="manageRegion"></select>

<div class="step">STEP 3. 학교 이름 입력</div>
<input id="manageName" placeholder="학교 이름 입력">

<div class="dropZone" id="dropZone">
📂 포스터 사진 올리기
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">
<img id="preview" class="preview">

<button class="primary" onclick="saveSchool()">
학교 추가 / 포스터 등록
</button>

<button class="gray" onclick="openDeletePage()">
학교 삭제 / 포스터 삭제
</button>

<button class="gray" onclick="backMain()">
뒤로가기
</button>

</div>

</div>

<!-- 삭제 페이지 -->
<div class="page" id="deletePage">

<div class="card">
<h2>학교 삭제 / 포스터 삭제</h2>

<div class="step">STEP 1. 유형 선택</div>
<select id="deleteType"></select>

<div class="step">STEP 2. 지역 선택</div>
<select id="deleteRegion"></select>

<div class="step">STEP 3. 학교 선택</div>
<select id="deleteSchool"></select>

<button class="primary" onclick="searchDeleteSchool()">
조회하기
</button>

<div id="deleteResult"></div>

<button class="gray" onclick="openManage()">
뒤로가기
</button>

</div>

</div>

<script>
/* 삭제 페이지 열기 */
function openDeletePage(){

showPage("deletePage");

let typeHtml="";
types.forEach(t=>{
typeHtml += `<option>${t}</option>`;
});

document.getElementById("deleteType").innerHTML = typeHtml;

let regionHtml="";
regions.forEach(r=>{
regionHtml += `<option>${r}</option>`;
});

document.getElementById("deleteRegion").innerHTML = regionHtml;

updateDeleteSchoolList();
}

/* 삭제용 학교 목록 */
function updateDeleteSchoolList(){

let type = document.getElementById("deleteType").value;
let region = document.getElementById("deleteRegion").value;

let filtered = schools.filter(s=>
s.type===type &&
s.region===region
);

let html=`<option value="">학교 선택</option>`;

filtered.forEach(s=>{
html += `<option>${s.name}</option>`;
});

document.getElementById("deleteSchool").innerHTML = html;
}

document.addEventListener("change",function(e){

if(
e.target.id==="deleteType" ||
e.target.id==="deleteRegion"
){
updateDeleteSchoolList();
}

});

/* 조회 */
function searchDeleteSchool(){

let name=document.getElementById("deleteSchool").value;

if(name===""){
alert("학교를 선택하세요.");
return;
}

let school=schools.find(s=>s.name===name);

let html=`
<div class="resultItem">
${school.name}

<button class="red"
onclick="deletePoster('${school.name}')">
포스터 삭제
</button>

<button class="red"
onclick="deleteSchoolFinal('${school.name}')">
학교 삭제
</button>
</div>
`;

document.getElementById("deleteResult").innerHTML=html;
}

/* 포스터 삭제 */
function deletePoster(name){

let school=schools.find(s=>s.name===name);

if(school){
school.poster="";
saveData();
alert("포스터 삭제 완료");
}

}

/* 학교 삭제 */
function deleteSchoolFinal(name){

schools = schools.filter(s=>s.name!==name);

saveData();

updateSchoolList();
updateDeleteSchoolList();

document.getElementById("deleteResult").innerHTML="";

alert("학교 삭제 완료");
}
</script>
